<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Heisenberg's Lab</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:#0e0e0e;
    color:#e8e6d9;
    font-family:'Courier New',Courier,monospace;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:1.5rem;
  }

  .container{
    width:100%;
    max-width:700px;
  }

  .header{
    text-align:center;
    margin-bottom:2rem;
  }
  .header h1{
    font-size:24px;
    font-weight:700;
    color:#c8f542;
    letter-spacing:2px;
    text-transform:uppercase;
  }
  .header p{
    font-size:11px;
    color:#666;
    margin-top:4px;
    letter-spacing:1.5px;
  }

  .game-area{
    display:flex;
    gap:1.5rem;
    justify-content:center;
    align-items:flex-start;
    flex-wrap:wrap;
  }

  /* TUBES */
  .tubes-section{}
  #tubes-row{
    display:flex;
    gap:20px;
    align-items:flex-end;
  }
  .tw{
    cursor:pointer;
    user-select:none;
    display:inline-flex;
    flex-direction:column;
    align-items:center;
    transition:transform 0.15s, opacity 0.3s;
  }
  .tw:not(.poured):hover{transform:translateY(-10px);}
  .tw.poured{opacity:0.35;cursor:not-allowed;}
  .tw-label{
    font-size:12px;
    color:#c8f542;
    margin-top:8px;
    letter-spacing:0.5px;
  }

  @keyframes shake{
    0%,100%{transform:rotate(0) translate(0,0)}
    15%{transform:rotate(-12deg) translate(-4px,-2px)}
    30%{transform:rotate(12deg) translate(4px,0)}
    45%{transform:rotate(-8deg) translate(-3px,3px)}
    60%{transform:rotate(8deg) translate(3px,-2px)}
    75%{transform:rotate(-5deg)}
    90%{transform:rotate(5deg)}
  }
  .shake{animation:shake 0.75s ease-in-out;}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
  .glow{animation:pulse 1.8s ease-in-out infinite;}

  #seq-display{
    font-size:11px;
    color:#555;
    text-align:center;
    margin-top:12px;
    min-height:16px;
    letter-spacing:0.3px;
  }

  /* BEAKER */
  .beaker-section{
    text-align:center;
    padding-top:14px;
  }
  .beaker-label{
    font-size:10px;
    color:#444;
    margin-top:5px;
    letter-spacing:1px;
  }

  /* TRAY */
  .tray-section{
    text-align:center;
    padding-top:56px;
  }
  .tray-label{
    font-size:10px;
    color:#444;
    margin-top:5px;
    letter-spacing:1px;
  }

  /* HINT */
  .hint{
    background:#161616;
    border:1px solid #2a2a2a;
    border-radius:8px;
    padding:1rem 1.25rem;
    min-width:162px;
  }
  .hint-title{
    font-size:10px;
    color:#555;
    letter-spacing:1.5px;
    margin-bottom:10px;
    font-weight:700;
  }
  .hint-row{
    display:flex;
    align-items:center;
    gap:9px;
    padding:5px 0;
    border-bottom:1px solid #222;
    font-size:12px;
    color:#aaa;
  }
  .hint-row:last-child{border-bottom:none;}
  .hdot{
    width:9px;height:9px;
    border-radius:50%;
    flex-shrink:0;
  }

  /* RESULT */
  #result{
    text-align:center;
    margin-top:2rem;
    min-height:36px;
    font-size:22px;
    font-weight:700;
    letter-spacing:1px;
  }
  .success{color:#c8f542;}
  .fail{color:#e24b4a;}

  /* RESET */
  #rstbtn{
    display:none;
    margin:1rem auto 0;
    background:transparent;
    border:1px solid #333;
    color:#888;
    font-family:'Courier New',monospace;
    font-size:12px;
    letter-spacing:1px;
    padding:8px 20px;
    border-radius:4px;
    cursor:pointer;
    transition:border-color 0.2s, color 0.2s;
  }
  #rstbtn:hover{border-color:#c8f542;color:#c8f542;}
  #rstbtn-wrap{text-align:center;}

  /* scanline overlay feel */
  body::after{
    content:'';
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.03) 0px,
      rgba(0,0,0,0.03) 1px,
      transparent 1px,
      transparent 2px
    );
    pointer-events:none;
    z-index:999;
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>Heisenberg's Lab</h1>
    <p>CLICK TUBES IN THE CORRECT ORDER</p>
  </div>

  <div class="game-area">

    <!-- TUBES -->
    <div class="tubes-section">
      <div id="tubes-row"></div>
      <div id="seq-display"></div>
    </div>

    <!-- BEAKER -->
    <div class="beaker-section">
      <svg width="72" height="140" viewBox="0 0 72 140" id="bsvg">
        <defs>
          <clipPath id="bclip">
            <path d="M9,22 L9,107 Q9,124 36,124 Q63,124 63,107 L63,22 Z"/>
          </clipPath>
        </defs>
        <rect id="bliq" clip-path="url(#bclip)" x="9" y="124" width="54" height="0" fill="#9FE1CB"/>
        <path d="M9,22 L9,107 Q9,124 36,124 Q63,124 63,107 L63,22"
              fill="none" stroke="#333" stroke-width="1.5"/>
        <line x1="9" y1="22" x2="63" y2="22" stroke="#333" stroke-width="1.5"/>
        <line x1="9" y1="65" x2="20" y2="65" stroke="#2a2a2a" stroke-width="0.8"/>
        <line x1="9" y1="85" x2="20" y2="85" stroke="#2a2a2a" stroke-width="0.8"/>
        <line x1="9" y1="105" x2="20" y2="105" stroke="#2a2a2a" stroke-width="0.8"/>
        <text x="24" y="68" font-family="Courier New" font-size="7" fill="#333">50</text>
        <text x="24" y="88" font-family="Courier New" font-size="7" fill="#333">25</text>
      </svg>
      <div class="beaker-label">MIXING BEAKER</div>
    </div>

    <!-- TRAY -->
    <div class="tray-section">
      <svg width="104" height="70" viewBox="0 0 104 70" id="tsvg">
        <rect x="5" y="50" width="94" height="16" rx="3"
              fill="#161616" stroke="#2a2a2a" stroke-width="1"/>
        <rect id="prod" x="10" y="28" width="84" height="24" rx="3" fill="none"/>
        <text id="plbl" x="52" y="43" text-anchor="middle"
              font-family="Courier New" font-size="10"
              font-weight="700" fill="none" letter-spacing="1">BLUE SKY</text>
      </svg>
      <div class="tray-label">PRODUCT TRAY</div>
    </div>

    <!-- HINT -->
    <div class="hint">
      <div class="hint-title">SYNTHESIS ROUTE</div>
      <div class="hint-row">
        <span class="hdot" style="background:#639922;"></span>
        <span>1. Methylamine</span>
      </div>
      <div class="hint-row">
        <span class="hdot" style="background:#1D9E75;"></span>
        <span>2. Phenylacetone</span>
      </div>
      <div class="hint-row">
        <span class="hdot" style="background:#E24B4A;"></span>
        <span>3. Sodium hydroxide</span>
      </div>
      <div class="hint-row">
        <span class="hdot" style="background:#BA7517;"></span>
        <span>4. Hydrochloric acid</span>
      </div>
    </div>

  </div>

  <div id="result"></div>
  <div id="rstbtn-wrap">
    <button id="rstbtn" onclick="doReset()">[ RESET LAB ]</button>
  </div>

</div>

<script>
const T=[
  {id:0, sym:'NaOH',         fill:'#7a1f1f', stroke:'#E24B4A', lh:56},
  {id:1, sym:'HCl',          fill:'#7a5210', stroke:'#BA7517', lh:48},
  {id:2, sym:'CH\u2083NH\u2082', fill:'#2e5c0e', stroke:'#639922', lh:62},
  {id:3, sym:'P2P',          fill:'#0a4a38', stroke:'#1D9E75', lh:52},
];
const CORRECT=[2,3,0,1];
const MIX=['#2e5c0e','#0a4a38','#4a4a0e','#5a5a12'];
let seq=[],over=false;

function tubeSVG(t){
  const poured=seq.includes(t.id);
  const n=seq.indexOf(t.id);
  const H=108;
  const ly=H-t.lh;
  return `<div class="tw${poured?' poured':''}" id="tw${t.id}" onclick="pick(${t.id})">
    <svg width="44" height="${H}" viewBox="0 0 44 ${H}">
      <defs>
        <clipPath id="tc${t.id}">
          <path d="M10,0 L10,${H-14} Q10,${H} 22,${H} Q34,${H} 34,${H-14} L34,0 Z"/>
        </clipPath>
      </defs>
      <rect clip-path="url(#tc${t.id})" x="10" y="${ly}" width="24" height="${H}" fill="${t.fill}"/>
      <path d="M10,0 L10,${H-14} Q10,${H} 22,${H} Q34,${H} 34,${H-14} L34,0"
            fill="none" stroke="${t.stroke}" stroke-width="1.5"/>
      <line x1="8" y1="1" x2="36" y2="1" stroke="${t.stroke}" stroke-width="1.5"/>
      ${poured
        ? `<text x="22" y="20" text-anchor="middle" font-size="14"
               font-weight="700" fill="${t.stroke}"
               font-family="Courier New">${n+1}</text>`
        : ''}
    </svg>
    <div class="tw-label">${t.sym}</div>
  </div>`;
}

function render(){
  document.getElementById('tubes-row').innerHTML=T.map(tubeSVG).join('');
  const s=document.getElementById('seq-display');
  s.textContent=seq.length
    ? 'Added: '+seq.map(i=>T[i].sym).join(' \u2192 ')
    : '';
}

function setBeaker(n,ok){
  const liq=document.getElementById('bliq');
  if(!n){
    liq.setAttribute('height','0');
    liq.setAttribute('y','124');
    return;
  }
  const fill=ok?'#1a3d8f':MIX[n-1];
  const h=n*25;
  liq.setAttribute('height',h);
  liq.setAttribute('y',124-h);
  liq.setAttribute('fill',fill);
}

function pick(id){
  if(over||seq.includes(id))return;
  seq.push(id);
  render();
  const allOk=seq.length===4&&seq.every((v,i)=>v===CORRECT[i]);
  setBeaker(seq.length,allOk);
  if(seq.length===4)check();
}

function check(){
  over=true;
  const ok=seq.every((v,i)=>v===CORRECT[i]);
  if(ok){
    const p=document.getElementById('prod');
    p.setAttribute('fill','#1547c8');
    p.classList.add('glow');
    document.getElementById('plbl').setAttribute('fill','#c8f0ff');
    document.getElementById('result').innerHTML=
      '<span class="success">Yeah, science!</span>';
  } else {
    T.forEach(t=>{
      const e=document.getElementById('tw'+t.id);
      if(e)e.classList.add('shake');
    });
    setTimeout(()=>{
      document.getElementById('result').innerHTML=
        '<span class="fail">Chemistry must be respected.</span>';
    },750);
  }
  document.getElementById('rstbtn').style.display='inline-block';
}

function doReset(){
  seq=[];over=false;
  const p=document.getElementById('prod');
  p.setAttribute('fill','none');
  p.classList.remove('glow');
  document.getElementById('plbl').setAttribute('fill','none');
  document.getElementById('result').innerHTML='';
  document.getElementById('rstbtn').style.display='none';
  setBeaker(0,false);
  render();
}

render();
</script>
</body>
</html>
